
<style>
#erd-wrap svg { max-width: 100%; }
</style>
<div id="erd-wrap"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a5f' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#B5D4F4' : '#042C53',
    secondaryColor: dark ? '#1a3d2e' : '#E1F5EE',
    tertiaryColor: dark ? '#2a1f3d' : '#EEEDFE',
  },
});
const diagram = `erDiagram
  CATEGORIES {
    int category_id PK
    varchar name
  }
  MANUFACTURERS {
    int manufacturer_id PK
    varchar name
    varchar country
    varchar contact
  }
  SUPPLIERS {
    int supplier_id PK
    varchar company_name
    varchar contact_person
    varchar phone
    varchar email
    varchar city
    boolean is_active
  }
  MEDICINES {
    int medicine_id PK
    int category_id FK
    int manufacturer_id FK
    int supplier_id FK
    varchar name
    varchar dosage_form
    decimal unit_price
    date expiry_date
    varchar batch_no
  }
  STOCK {
    int stock_id PK
    int medicine_id FK
    int quantity
    int low_stock_threshold
    datetime last_updated
  }
  STOCK_TRANSACTIONS {
    int transaction_id PK
    int medicine_id FK
    enum type
    int quantity
    varchar reason
    datetime created_at
  }
  PURCHASE_ORDERS {
    int order_id PK
    int supplier_id FK
    date order_date
    date expected_delivery
    enum status
  }
  PURCHASE_ORDER_ITEMS {
    int item_id PK
    int order_id FK
    int medicine_id FK
    int quantity
    decimal unit_price
  }
  DOCTORS {
    int doctor_id PK
    varchar name
    varchar specialization
    varchar phone
  }
  PATIENTS {
    int patient_id PK
    varchar name
    varchar phone
    date dob
    varchar address
  }
  PRESCRIPTIONS {
    int prescription_id PK
    int patient_id FK
    int doctor_id FK
    date prescribed_date
    text notes
  }
  PRESCRIPTION_ITEMS {
    int item_id PK
    int prescription_id FK
    int medicine_id FK
    int quantity
    text instructions
  }
  DISPENSE_RECORDS {
    int dispense_id PK
    int prescription_id FK
    int medicine_id FK
    int quantity
    datetime dispensed_at
    varchar dispensed_by
  }

  CATEGORIES ||--o{ MEDICINES : classifies
  MANUFACTURERS ||--o{ MEDICINES : produces
  SUPPLIERS ||--o{ MEDICINES : supplies
  MEDICINES ||--|| STOCK : tracks
  MEDICINES ||--o{ STOCK_TRANSACTIONS : logs
  MEDICINES ||--o{ PURCHASE_ORDER_ITEMS : included_in
  SUPPLIERS ||--o{ PURCHASE_ORDERS : receives
  PURCHASE_ORDERS ||--o{ PURCHASE_ORDER_ITEMS : contains
  PATIENTS ||--o{ PRESCRIPTIONS : has
  DOCTORS ||--o{ PRESCRIPTIONS : writes
  PRESCRIPTIONS ||--o{ PRESCRIPTION_ITEMS : lists
  MEDICINES ||--o{ PRESCRIPTION_ITEMS : prescribed_in
  PRESCRIPTIONS ||--o{ DISPENSE_RECORDS : fulfilled_by
  MEDICINES ||--o{ DISPENSE_RECORDS : dispensed_via
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd-wrap').innerHTML = svg;
document.querySelectorAll('#erd-wrap svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd-wrap svg.erDiagram .row-rect-odd path, #erd-wrap svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
